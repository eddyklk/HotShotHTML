<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="manifest" href="./manifest.json">

    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;600;800&display=swap');

        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-red: #ff3131;
            --neon-gold: #ffd700;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #080c14;
            color: #f8fafc;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .title-font {
            font-family: 'Bangers', cursive;
            letter-spacing: 3px;
        }

        .glass {
            background: rgba(21, 27, 43, 0.9);
            border: 1px solid rgba(30, 41, 59, 1);
        }

        .neon-border-pink { border: 2px solid var(--neon-pink); box-shadow: 0 0 20px rgba(255,0,127,0.4); }
        .neon-border-blue { border: 2px solid var(--neon-blue); box-shadow: 0 0 20px rgba(0,243,255,0.4); }
        .neon-border-red { border: 2px solid var(--neon-red); box-shadow: 0 0 20px rgba(255,49,49,0.4); }
        .neon-border-gold { border: 2px solid var(--neon-gold); box-shadow: 0 0 20px rgba(255,215,0,0.4); }
        
        .card-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            transition: all 0.2s ease;
        }

        .btn-primary:active:not(:disabled) { transform: scale(0.95); }

        .shot-icon { filter: drop-shadow(0 0 8px var(--neon-blue)); }

        .rule-badge {
            background: rgba(255, 49, 49, 0.1);
            border: 1px solid var(--neon-red);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-pink); border-radius: 10px; }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }

        /* Notificación Flotante (Toast) */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 49, 49, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(255, 49, 49, 0.5);
            z-index: 100;
            white-space: nowrap;
            border: 2px solid #ff3131;
        }
    </style>
</head>

        if ('serviceWorker' in navigator) {

        // --- SÍNTESIS DE AUDIO WEB ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'card') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(400, now);
                oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.25);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                oscillator.start(now);
                oscillator.stop(now + 0.25);
            } else if (type === 'error') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(180, now);
                oscillator.frequency.linearRampToValueAtTime(120, now + 0.35);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                oscillator.start(now);
                oscillator.stop(now + 0.35);
            } else if (type === 'click') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1200, now);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                oscillator.start(now);
                oscillator.stop(now + 0.08);
            }
        }

            setTimeout(() => {
                toast.classList.remove('animate__fadeInDown');
                toast.classList.add('animate__fadeOutUp');
                setTimeout(() => {
                    toast.classList.add('hidden');
                }, 500); 
            }, 3000);

        async function fetchCards() {
            const statusLabel = document.getElementById('cloud-status');
            try {
                const response = await fetch(GITHUB_URL);
                if (!response.ok) throw new Error("Network error");
                
                const data = await response.json();
                chillCards = data.chill;
                partyCards = data.party;
                extremeCards = data.extreme;
                hotCards = data.hot;
                
                statusLabel.innerText = "SINCRO EN LA NUBE COMPLETADA ✨";
                statusLabel.classList.add('text-green-400');
                statusLabel.classList.remove('text-slate-400');
            } catch (error) {
                console.warn("No hay internet o falló GitHub. Cargando backup local.");
                chillCards = backupCards.chill;
                partyCards = backupCards.party;
                extremeCards = backupCards.extreme;
                hotCards = backupCards.hot;
                
                statusLabel.innerText = "MODO OFFLINE (SIN CONEXIÓN)";
                statusLabel.classList.add('text-yellow-500');
                statusLabel.classList.remove('text-slate-400');
            }
        }

        let players = [];
        let ruleCooldowns = {};
        let activeRules = [];
        let currentDifficulty = 'party';
        let currentPlayerIndex = 0;

        window.onload = function() {
            updateStartButtonText();
            fetchCards();
        };

        function updateStartButtonText() {
            const hour = new Date().getHours();
            const btn = document.getElementById('start-btn');
            if (hour >= 6 && hour < 12) btn.innerText = "ENCENDER LA MAÑANA";
            else if (hour >= 12 && hour < 18) btn.innerText = "ENCENDER LA TARDE";
            else if (hour >= 18 && hour <= 23) btn.innerText = "ENCENDER LA NOCHE";
            else btn.innerText = "ENCENDER LA MADRUGADA";
        }

        function addPlayer() {
            const input = document.getElementById('player-input');
            const name = input.value.trim();
            
            if (name) {
                const nameExists = players.some(p => p.toLowerCase() === name.toLowerCase());
                if (nameExists) {
                    showToast(`⚠️ ¡El jugador "${name}" ya está en la lista!`);
                    playSound('error');
                    return; 
                }

                players.push(name);
                ruleCooldowns[name] = 0;
                input.value = '';
                playSound('click');
                updateUI();
            }
        }

        function removePlayer(name) {
            players = players.filter(p => p !== name);
            delete ruleCooldowns[name];
            playSound('click');
            updateUI();
        }

        function updateUI() {
            document.getElementById('player-count').innerText = `(${players.length})`;

            const list = document.getElementById('player-list');
            if (players.length === 0) {
                list.innerHTML = `<p id="empty-players" class="text-slate-500 text-center text-xs sm:text-sm">Añade amigos para empezar...</p>`;
            } else {
                list.innerHTML = players.map(p => `
                        <div class="flex justify-between items-center bg-white/5 px-3 sm:px-4 py-2 rounded-xl border border-white/5 animate__animated animate__fadeInLeft animate__faster">
                            <span class="font-bold text-white text-sm sm:text-base tracking-wide">${p}</span>
                            <button onclick="removePlayer('${p}')" class="text-pink-500 hover:text-white text-lg sm:text-xl">✕</button>
                        </div>
                    `).join('');
            }

            const btn = document.getElementById('start-btn');
            if (players.length >= 2) {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        function setDifficulty(diff) {
            currentDifficulty = diff;
            playSound('click');

            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('border-2', 'border-pink-500', 'text-white', 'border-yellow-400', 'shadow-[0_0_15px_rgba(255,215,0,0.4)]');
                btn.classList.add('text-slate-400', 'border', 'border-transparent');
            });

            const selectedBtn = event.currentTarget;
            selectedBtn.classList.remove('text-slate-400', 'border-transparent');

            if (diff === 'hot') {
                selectedBtn.classList.add('border-2', 'border-yellow-400', 'text-white', 'shadow-[0_0_15px_rgba(255,215,0,0.4)]');
            } else {
                selectedBtn.classList.add('border-2', 'border-pink-500', 'text-white');
            }
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playSound('click');
            activeRules = [];
            currentPlayerIndex = 0;
            players.forEach(p => ruleCooldowns[p] = 0);

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderRules();
            nextTurn();
        }

        function nextTurn() {
            if (players.length === 0) return;

            const playerName = players[currentPlayerIndex];
            document.getElementById('current-player-name').innerText = playerName.toUpperCase();

            let pool = [];
            let catName = "Dinámica Activa";
            let isHot = false;

            if (currentDifficulty === 'chill') { pool = [...chillCards]; catName = "SOCIAL"; }
            else if (currentDifficulty === 'party') { pool = [...chillCards, ...partyCards]; catName = "FIESTA"; }
            else if (currentDifficulty === 'extreme') { pool = [...partyCards, ...extremeCards]; catName = "CAOS"; }
            else if (currentDifficulty === 'hot') { pool = [...extremeCards, ...hotCards]; catName = "CALIENTE 🔥"; isHot = true; }

            let card = pool[Math.floor(Math.random() * pool.length)];

            if (card.isRule && ruleCooldowns[playerName] > 0) {
                const noRules = pool.filter(c => !c.isRule);
                if (noRules.length > 0) {
                    card = noRules[Math.floor(Math.random() * noRules.length)];
                }
            }

            players.forEach(p => {
                if (ruleCooldowns[p] > 0) ruleCooldowns[p]--;
            });

            const otherPlayers = players.filter(p => p !== playerName);
            const randomOtherPlayer = otherPlayers.length > 0
                ? otherPlayers[Math.floor(Math.random() * otherPlayers.length)]
                : "el jugador a tu derecha";

            displayCard(card, playerName, randomOtherPlayer, catName, isHot);
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        }

        function displayCard(card, player, otherPlayer, categoryText, isHot) {
            const cardEl = document.getElementById('game-card');
            const iconEl = document.getElementById('card-icon');
            const titleEl = document.getElementById('card-title');
            const descEl = document.getElementById('card-description');
            const shotEl = document.getElementById('shot-count');
            const categoryEl = document.getElementById('card-category');

            iconEl.classList.remove('animate__bounceIn', 'animate__tada', 'animate__shakeX');
            void iconEl.offsetWidth;

            categoryEl.innerText = categoryText;
            categoryEl.className = `absolute top-6 sm:top-8 left-0 right-0 text-[9px] sm:text-[10px] font-black uppercase tracking-[0.4em] opacity-80 ${isHot ? 'text-yellow-400' : 'text-cyan-400'}`;

            titleEl.innerText = card.title.toUpperCase();

            let parsedDesc = card.desc.replace(/El jugador actual/g, player);
            parsedDesc = parsedDesc.replace(/\[OTRO_JUGADOR\]/g, `<strong class="text-pink-400">${otherPlayer}</strong>`);
            descEl.innerHTML = parsedDesc;

            shotEl.innerHTML = "";

            if (card.isRule) {
                playSound('error');
                iconEl.innerText = "🚨";
                iconEl.classList.add('animate__shakeX');

                cardEl.className = `card-gradient min-h-[350px] sm:min-h-[400px] rounded-[35px] sm:rounded-[45px] p-6 sm:p-8 flex flex-col items-center justify-center text-center shadow-2xl relative overflow-hidden transition-all duration-300 border border-white/5 ${isHot ? 'neon-border-gold' : 'neon-border-red'}`;

                ruleCooldowns[player] = 5;
                const ruleText = `${card.title} (${player})`;

                if (activeRules.length >= 3) activeRules.shift();
                activeRules.push({ fullText: ruleText });

                renderRules();
            } else {
                playSound('card');
                iconEl.innerText = isHot ? "🌶️" : (card.shots > 1 ? "🍻" : "🥃");
                iconEl.classList.add('animate__bounceIn');

                cardEl.className = `card-gradient min-h-[350px] sm:min-h-[400px] rounded-[35px] sm:rounded-[45px] p-6 sm:p-8 flex flex-col items-center justify-center text-center shadow-2xl relative overflow-hidden transition-all duration-300 border border-white/5 ${isHot ? 'neon-border-gold' : 'neon-border-pink'}`;

                for (let i = 0; i < card.shots; i++) {
                    shotEl.innerHTML += `<span class="text-3xl sm:text-4xl shot-icon drop-shadow-[0_0_10px_rgba(0,243,255,0.8)]">🥃</span>`;
                }
            }
        }

        function renderRules() {
            const container = document.getElementById('active-rules');
            const parent = document.getElementById('active-rules-container');
            const counter = document.getElementById('rules-counter');

            if (activeRules.length > 0) {
                parent.classList.remove('hidden');
            } else {
                parent.classList.add('hidden');
            }

            counter.innerText = `${activeRules.length}/3`;

            container.innerHTML = activeRules.map((r, i) => `
                    <div class="rule-badge px-3 py-2 sm:px-4 sm:py-3 rounded-xl animate__animated ${i === activeRules.length - 1 ? 'animate__flash' : 'animate__fadeIn'}">
                        <p class="text-[10px] sm:text-xs font-bold text-white uppercase tracking-wide">${r.fullText}</p>
                    </div>
                `).join('');
        }

        function requestExit() {
            playSound('click');
            document.getElementById('exit-modal').classList.remove('hidden');
        }

        function closeExitModal() {
            playSound('click');
            document.getElementById('exit-modal').classList.add('hidden');
        }

        function confirmExit() {
            playSound('click');
            document.getElementById('exit-modal').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            activeRules = [];
        }

        document.getElementById('player-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addPlayer();
        });

    </script>
</body>
</html>
