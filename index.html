<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOT SHOT - El Juego de Beber</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@400;600;800&display=swap');

        :root {
            --neon-pink: #ff007f;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-red: #ff3131;
            --neon-gold: #ffd700;
        }

        /* FONDO DEL JUEGO: Negro Puro */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000000;
            color: #f8fafc;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .title-font { font-family: 'Bangers', cursive; letter-spacing: 3px; }
        .glass { background: rgba(21, 27, 43, 0.9); border: 1px solid rgba(30, 41, 59, 1); }
        .neon-border-pink { border: 2px solid var(--neon-pink); box-shadow: 0 0 20px rgba(255,0,127,0.4); }
        .neon-border-gold { border: 2px solid var(--neon-gold); box-shadow: 0 0 20px rgba(255,215,0,0.4); }
        
        .card-gradient { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); }
        .btn-primary { background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple)); transition: all 0.2s ease; }
        .btn-primary:active:not(:disabled) { transform: scale(0.95); }
        .shot-icon { filter: drop-shadow(0 0 8px var(--neon-blue)); }
        
        .rule-badge { background: rgba(255, 49, 49, 0.1); border: 1px solid var(--neon-red); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-pink); border-radius: 10px; }
        .modal-overlay { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 49, 49, 0.95); color: white; padding: 12px 24px;
            border-radius: 20px; font-weight: 800; font-size: 14px;
            box-shadow: 0 10px 25px rgba(255, 49, 49, 0.5); z-index: 100;
            white-space: nowrap; border: 2px solid #ff3131;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-3 sm:p-4">

    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#000000] transition-opacity duration-500">
        <div class="animate__animated animate__pulse animate__infinite flex flex-col items-center">
            <h1 class="text-7xl title-font text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-400 drop-shadow-lg mb-6">HOT SHOT</h1>
        </div>
        <div class="w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="toast" class="toast hidden animate__animated">¡Mensaje de alerta!</div>

    <div id="setup-screen" class="w-full max-w-md animate__animated animate__fadeIn relative z-10 pt-4">
        <div class="text-center mb-6 mt-2">
            <h1 class="text-6xl sm:text-7xl title-font text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-400 drop-shadow-lg">HOT SHOT</h1>
            <p id="cloud-status" class="text-slate-400 font-bold text-[10px] sm:text-xs tracking-widest uppercase">CONECTANDO A LA NUBE...</p>
        </div>

        <div class="glass rounded-[20px] sm:rounded-[30px] p-4 sm:p-6 mb-4 shadow-xl">
            <h2 class="text-base sm:text-lg font-bold mb-3 flex items-center text-pink-400 uppercase tracking-tight">
                <span class="mr-2 text-xl">👥</span> JUGADORES <span id="player-count" class="ml-2 text-white/50 text-sm font-black">(0)</span>
            </h2>
            <div id="player-list" class="space-y-2 mb-4 max-h-32 overflow-y-auto pr-1 min-h-[60px] flex flex-col justify-center">
                <p id="empty-players" class="text-slate-500 text-center text-xs">Añade amigos para empezar...</p>
            </div>
            <div class="flex gap-2 w-full">
                <input id="player-input" type="text" placeholder="Nombre..."
                       class="flex-1 min-w-0 bg-[#080c14] border border-slate-700 rounded-xl px-3 py-2 focus:outline-none focus:border-pink-500 text-white text-sm transition-colors">
                <button onclick="addPlayer()" class="bg-pink-600 hover:bg-pink-500 w-12 shrink-0 rounded-xl transition-all shadow-lg font-bold text-xl pb-1 flex items-center justify-center">+</button>
            </div>
        </div>

        <div class="glass rounded-[20px] sm:rounded-[30px] p-4 sm:p-6 mb-6 shadow-xl">
            <h2 class="text-base font-bold mb-3 text-cyan-400 flex items-center justify-center tracking-widest">🔥 DIFICULTAD CARTAS 🔥</h2>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setDifficulty('chill')" class="diff-btn p-2 rounded-xl bg-slate-800 text-slate-400 border border-transparent text-[10px] font-bold uppercase transition-all">Social</button>
                <button onclick="setDifficulty('party')" class="diff-btn p-2 rounded-xl border-2 border-pink-500 bg-slate-800 text-white text-[10px] font-bold uppercase transition-all">Fiesta</button>
                <button onclick="setDifficulty('extreme')" class="diff-btn p-2 rounded-xl bg-slate-800 text-slate-400 border border-transparent text-[10px] font-bold uppercase transition-all">Caos</button>
                <button onclick="setDifficulty('hot')" class="diff-btn p-2 rounded-xl bg-slate-800 text-slate-400 border border-transparent text-[10px] font-bold uppercase transition-all">Caliente 🌶️</button>
            </div>
        </div>

        <button onclick="startGame()" id="start-btn" class="w-full btn-primary py-4 rounded-[15px] font-black text-lg shadow-[0_10px_25px_rgba(255,0,127,0.3)] opacity-50 cursor-not-allowed uppercase tracking-wider" disabled>
            ESPERANDO JUGADORES...
        </button>
        
        <button onclick="startImpostor()" id="impostor-btn" class="w-full bg-slate-800 border border-slate-700 text-slate-400 hover:text-white py-3 mt-3 rounded-[15px] font-black text-sm transition-all opacity-50 cursor-not-allowed uppercase tracking-wider" disabled>
            🕵️ MODO IMPOSTOR (Mín. 3)
        </button>
    </div>

    <div id="game-screen" class="hidden w-full max-w-md animate__animated animate__fadeIn relative z-10">
        <div class="flex justify-between items-center mb-4 mt-2">
            <button onclick="requestExit()" class="text-slate-500 hover:text-white transition-colors font-bold text-[10px] tracking-widest">✕ SALIR</button>
            <div class="bg-pink-500/10 px-3 py-1.5 rounded-full border border-pink-500/50 text-pink-400 text-[10px] font-black uppercase tracking-widest">
                TURNO: <span id="current-player-name" class="text-white ml-1">---</span>
            </div>
        </div>

        <div id="game-card" class="card-gradient min-h-[350px] rounded-[35px] p-6 flex flex-col items-center justify-center text-center shadow-2xl relative overflow-hidden transition-all border border-white/5">
            <div id="card-category" class="absolute top-6 left-0 right-0 text-[9px] font-black uppercase tracking-[0.4em] text-cyan-400 opacity-70">DINÁMICA ACTIVA</div>
            <div id="card-icon" class="text-6xl mb-4 animate__animated">🥃</div>
            <h3 id="card-title" class="text-3xl font-black mb-3 leading-tight uppercase title-font tracking-wide">...</h3>
            <p id="card-description" class="text-slate-300 text-base mb-6 leading-relaxed px-2">...</p>
            <div id="shot-count" class="flex gap-2 flex-wrap justify-center"></div>
        </div>

        <div id="active-rules-container" class="mt-4 hidden">
            <div class="flex justify-between items-center mb-2">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest flex items-center">
                    <span class="w-1.5 h-1.5 bg-red-500 rounded-full mr-2 animate-pulse"></span> REGLAS ACTIVAS
                </p>
                <span id="rules-counter" class="text-red-400 text-[9px] font-black">0/3</span>
            </div>
            <div id="active-rules" class="space-y-2"></div>
        </div>

        <div class="mt-6">
            <button onclick="nextTurn()" class="w-full bg-white text-black py-4 rounded-[20px] font-black text-xl shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:bg-slate-200 transition-all active:scale-95 uppercase tracking-tighter">
                Siguiente Carta ⚡
            </button>
        </div>
    </div>

    <div id="impostor-screen" class="hidden w-full max-w-md animate__animated animate__fadeIn relative z-10 text-center flex flex-col justify-center min-h-[80vh]">
        <div class="flex justify-between items-center absolute top-2 left-0 right-0 w-full">
            <button onclick="requestExit()" class="text-slate-500 hover:text-white transition-colors font-bold text-[10px] tracking-widest">✕ SALIR</button>
            <div class="bg-cyan-500/10 px-3 py-1.5 rounded-full border border-cyan-500/50 text-cyan-400 text-[10px] font-black uppercase tracking-widest">
                MODO IMPOSTOR 🕵️
            </div>
        </div>

        <div id="impostor-content" class="mt-12 w-full"></div>
    </div>

    <div id="exit-modal" class="fixed inset-0 modal-overlay z-50 hidden flex items-center justify-center p-4">
        <div class="glass p-6 rounded-[25px] max-w-sm w-full text-center border-t-8 border-pink-500 animate__animated animate__bounceIn">
            <div class="text-5xl mb-3">⚠️</div>
            <h2 class="text-xl font-black mb-3 text-white uppercase tracking-tight">¿TERMINAR JUEGO?</h2>
            <p class="text-slate-400 mb-6 font-medium text-xs">Volverás al menú principal.</p>
            <div class="flex flex-col gap-2">
                <button onclick="confirmExit()" class="w-full bg-pink-600 hover:bg-pink-500 py-3 rounded-xl font-black text-white transition-all uppercase text-xs">SÍ, VOLVER AL MENÚ</button>
                <button onclick="closeExitModal()" class="w-full bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-black text-slate-300 transition-all uppercase text-xs">CANCELAR</button>
            </div>
        </div>
    </div>

    <script>
        // PWA REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('PWA error: ', err));
            });
        }

        // AUDIO
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'card') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.25);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, now); osc.frequency.linearRampToValueAtTime(120, now + 0.35);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now); osc.stop(now + 0.35);
            } else if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now); gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08); osc.start(now); osc.stop(now + 0.08);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('hidden', 'animate__fadeOutUp');
            toast.classList.add('animate__fadeInDown');
            setTimeout(() => {
                toast.classList.remove('animate__fadeInDown');
                toast.classList.add('animate__fadeOutUp');
                setTimeout(() => toast.classList.add('hidden'), 500); 
            }, 3000); 
        }

        // GITHUB DB CARDS
        const GITHUB_URL = "https://raw.githubusercontent.com/eddyklk/ApihotShot/refs/heads/main/cartas_hotshot.json";
        let chillCards = [], partyCards = [], extremeCards = [], hotCards = [];
        const backupCards = {
            chill: [{ title: "Yo Nunca", desc: "Bebe 1 si alguna vez has mentido para salir de una cita.", shots: 1, isRule: false }],
            party: [{ title: "Votación Letal", desc: "Señalen al más problemático. Bebe 1.", shots: 1, isRule: false }],
            extreme: [{ title: "Fondo Total", desc: "Toma 1 shot completo.", shots: 1, isRule: false }],
            hot: [{ title: "Prenda o Shot", desc: "Quítate una prenda de ropa o toma 2 shots.", shots: 2, isRule: false }]
        };

        async function fetchCards() {
            const statusLabel = document.getElementById('cloud-status');
            try {
                const response = await fetch(GITHUB_URL);
                if (!response.ok) throw new Error("Network error");
                const data = await response.json();
                chillCards = data.chill; partyCards = data.party; extremeCards = data.extreme; hotCards = data.hot;
                statusLabel.innerText = "✨sincro";
                statusLabel.classList.replace('text-slate-400', 'text-green-400');
            } catch (error) {
                chillCards = backupCards.chill; partyCards = backupCards.party; extremeCards = backupCards.extreme; hotCards = backupCards.hot;
                statusLabel.innerText = "MODO OFFLINE (SIN CONEXIÓN)";
                statusLabel.classList.replace('text-slate-400', 'text-yellow-500');
            }
        }

        let players = [];
        let ruleCooldowns = {};
        let activeRules = [];
        let currentDifficulty = 'party';
        let currentPlayerIndex = 0;

        window.onload = function() {
            updateStartButtonText();
            fetchCards(); 
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.classList.add('hidden'), 500);
            }, 1500);
        };

        function updateStartButtonText() {
            const hour = new Date().getHours();
            const btn = document.getElementById('start-btn');
            if (hour >= 6 && hour < 12) btn.innerText = "ENCENDER LA MAÑANA";
            else if (hour >= 12 && hour < 18) btn.innerText = "ENCENDER LA TARDE";
            else if (hour >= 18 && hour <= 23) btn.innerText = "ENCENDER LA NOCHE";
            else btn.innerText = "ENCENDER LA MADRUGADA";
        }

        function addPlayer() {
            const input = document.getElementById('player-input');
            const name = input.value.trim();
            if (name) {
                if (players.some(p => p.toLowerCase() === name.toLowerCase())) {
                    showToast(`⚠️ ¡"${name}" ya está en la lista!`); playSound('error'); return; 
                }
                players.push(name); ruleCooldowns[name] = 0; input.value = ''; playSound('click'); updateUI();
            }
        }

        function removePlayer(name) {
            players = players.filter(p => p !== name); delete ruleCooldowns[name]; playSound('click'); updateUI();
        }

        function updateUI() {
            document.getElementById('player-count').innerText = `(${players.length})`;
            const list = document.getElementById('player-list');
            if (players.length === 0) {
                list.innerHTML = `<p class="text-slate-500 text-center text-xs">Añade amigos para empezar...</p>`;
            } else {
                list.innerHTML = players.map(p => `
                    <div class="flex justify-between items-center bg-white/5 px-4 py-2 rounded-xl border border-white/5 mb-2 animate__animated animate__fadeInLeft animate__faster">
                        <span class="font-bold text-white text-sm tracking-wide">${p}</span>
                        <button onclick="removePlayer('${p}')" class="text-pink-500 hover:text-white text-xl">✕</button>
                    </div>`).join('');
            }

            const btn = document.getElementById('start-btn');
            const impBtn = document.getElementById('impostor-btn');
            
            if (players.length >= 2) {
                btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed');
            }

            if (players.length >= 3) {
                impBtn.disabled = false; impBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                impBtn.classList.replace('text-slate-400', 'text-cyan-400');
            } else {
                impBtn.disabled = true; impBtn.classList.add('opacity-50', 'cursor-not-allowed');
                impBtn.classList.replace('text-cyan-400', 'text-slate-400');
            }
        }

        function setDifficulty(diff) {
            currentDifficulty = diff; playSound('click');
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('border-2', 'border-pink-500', 'text-white', 'border-yellow-400', 'shadow-[0_0_15px_rgba(255,215,0,0.4)]');
                btn.classList.add('text-slate-400', 'border', 'border-transparent');
            });
            const selBtn = event.currentTarget;
            selBtn.classList.remove('text-slate-400', 'border-transparent');
            if (diff === 'hot') selBtn.classList.add('border-2', 'border-yellow-400', 'text-white', 'shadow-[0_0_15px_rgba(255,215,0,0.4)]');
            else selBtn.classList.add('border-2', 'border-pink-500', 'text-white');
        }

        function startGame() {
            playSound('click'); activeRules = []; currentPlayerIndex = 0; players.forEach(p => ruleCooldowns[p] = 0);
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderRules(); nextTurn();
        }

        function nextTurn() {
            if (players.length === 0) return;
            const playerName = players[currentPlayerIndex];
            document.getElementById('current-player-name').innerText = playerName.toUpperCase();

            let pool = [], catName = "Dinámica", isHot = false;
            if (currentDifficulty === 'chill') { pool = [...chillCards]; catName = "SOCIAL"; }
            else if (currentDifficulty === 'party') { pool = [...chillCards, ...partyCards]; catName = "FIESTA"; }
            else if (currentDifficulty === 'extreme') { pool = [...partyCards, ...extremeCards]; catName = "CAOS"; }
            else if (currentDifficulty === 'hot') { pool = [...extremeCards, ...hotCards]; catName = "CALIENTE 🔥"; isHot = true; }

            let card = pool[Math.floor(Math.random() * pool.length)];
            if (card.isRule && ruleCooldowns[playerName] > 0) {
                const noRules = pool.filter(c => !c.isRule);
                if (noRules.length > 0) card = noRules[Math.floor(Math.random() * noRules.length)];
            }

            players.forEach(p => { if (ruleCooldowns[p] > 0) ruleCooldowns[p]--; });
            const otherPlayers = players.filter(p => p !== playerName);
            const randomOtherPlayer = otherPlayers.length > 0 ? otherPlayers[Math.floor(Math.random() * otherPlayers.length)] : "el de la derecha";

            displayCard(card, playerName, randomOtherPlayer, catName, isHot);
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        }

        function displayCard(card, player, otherPlayer, catText, isHot) {
            const cardEl = document.getElementById('game-card');
            const iconEl = document.getElementById('card-icon');
            const titleEl = document.getElementById('card-title');
            const descEl = document.getElementById('card-description');
            const shotEl = document.getElementById('shot-count');

            iconEl.classList.remove('animate__bounceIn', 'animate__shakeX'); void iconEl.offsetWidth;
            document.getElementById('card-category').innerText = catText;
            document.getElementById('card-category').className = `absolute top-6 left-0 right-0 text-[9px] font-black uppercase tracking-[0.4em] opacity-80 ${isHot ? 'text-yellow-400' : 'text-cyan-400'}`;

            titleEl.innerText = card.title.toUpperCase();
            let pDesc = card.desc.replace(/El jugador actual/g, player).replace(/\[OTRO_JUGADOR\]/g, `<strong class="text-pink-400">${otherPlayer}</strong>`);
            descEl.innerHTML = pDesc; shotEl.innerHTML = "";

            if (card.isRule) {
                playSound('error'); iconEl.innerText = "🚨"; iconEl.classList.add('animate__shakeX');
                cardEl.className = `card-gradient min-h-[350px] rounded-[35px] p-6 flex flex-col items-center justify-center text-center shadow-2xl relative overflow-hidden transition-all border border-white/5 ${isHot ? 'neon-border-gold' : 'neon-border-red'}`;
                ruleCooldowns[player] = 5;
                if (activeRules.length >= 3) activeRules.shift();
                activeRules.push({ fullText: `${card.title} (${player})` }); renderRules();
            } else {
                playSound('card'); iconEl.innerText = isHot ? "🌶️" : (card.shots > 1 ? "🍻" : "🥃"); iconEl.classList.add('animate__bounceIn');
                cardEl.className = `card-gradient min-h-[350px] rounded-[35px] p-6 flex flex-col items-center justify-center text-center shadow-2xl relative overflow-hidden transition-all border border-white/5 ${isHot ? 'neon-border-gold' : 'neon-border-pink'}`;
                for (let i = 0; i < card.shots; i++) {
                    shotEl.innerHTML += `<span class="text-4xl shot-icon drop-shadow-[0_0_10px_rgba(0,243,255,0.8)]">🥃</span>`;
                }
            }
        }

        function renderRules() {
            const container = document.getElementById('active-rules');
            const parent = document.getElementById('active-rules-container');
            if (activeRules.length > 0) parent.classList.remove('hidden'); else parent.classList.add('hidden');
            document.getElementById('rules-counter').innerText = `${activeRules.length}/3`;
            container.innerHTML = activeRules.map((r, i) => `
                <div class="rule-badge px-4 py-2 rounded-xl animate__animated ${i === activeRules.length - 1 ? 'animate__flash' : 'animate__fadeIn'}">
                    <p class="text-[10px] font-bold text-white uppercase tracking-wide">${r.fullText}</p>
                </div>`).join('');
        }

        // --- SISTEMA MODO IMPOSTOR 🕵️ ---
        const impostorPairs = [
            ['Cerveza', 'Ron'], ['Ex', 'Casi algo'], ['Discoteca', 'Bar'], ['Hotel', 'Motel'], 
            ['Beso', 'Mordisco'], ['Tinder', 'Instagram'], ['Boda', 'Funeral'], 
            ['Resaca', 'Borrachera'], ['Playa', 'Piscina'], ['Policía', 'Ladrón']
        ];
        
        let impostorData = { roles: [], currentIndex: 0, impostorName: '', attemptsLeft: 1, eliminated: [] };

        function startImpostor() {
            if (players.length < 3) return;
            playSound('click');
            
            // Calcular Intentos
            let attempts = 1;
            if (players.length >= 5 && players.length <= 7) attempts = 2;
            if (players.length >= 8) attempts = 3;

            let shuffledPlayers = [...players].sort(() => Math.random() - 0.5);
            let pair = impostorPairs[Math.floor(Math.random() * impostorPairs.length)];
            let isReversed = Math.random() > 0.5;
            let civilianWord = isReversed ? pair[1] : pair[0];
            let impostorWord = isReversed ? pair[0] : pair[1];
            
            impostorData.impostorName = shuffledPlayers[0];
            impostorData.attemptsLeft = attempts;
            impostorData.eliminated = [];
            impostorData.roles = shuffledPlayers.map((p, i) => ({
                name: p, word: i === 0 ? impostorWord : civilianWord, isImpostor: i === 0
            })).sort(() => Math.random() - 0.5); 
            
            impostorData.currentIndex = 0;
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('impostor-screen').classList.remove('hidden');
            renderImpostorPass();
        }

        function renderImpostorPass() {
            const content = document.getElementById('impostor-content');
            if (impostorData.currentIndex >= impostorData.roles.length) {
                renderImpostorPlay();
                return;
            }
            const currentPlayer = impostorData.roles[impostorData.currentIndex].name;
            content.innerHTML = `
                <div class="animate__animated animate__fadeIn">
                    <div class="text-7xl mb-6">📱</div>
                    <h2 class="text-2xl font-black mb-2 uppercase text-slate-300">Pásale el celular a</h2>
                    <h1 class="text-5xl font-black mb-8 text-pink-500 uppercase">${currentPlayer}</h1>
                    <button onclick="renderImpostorReveal()" class="bg-cyan-500 text-black py-4 px-8 rounded-[20px] font-black text-xl shadow-[0_0_20px_rgba(0,243,255,0.4)] active:scale-95 transition-all">
                        Soy ${currentPlayer}, Ver Palabra 👀
                    </button>
                </div>
            `;
        }

        function renderImpostorReveal() {
            playSound('card');
            const role = impostorData.roles[impostorData.currentIndex];
            const content = document.getElementById('impostor-content');
            content.innerHTML = `
                <div class="glass p-8 rounded-[35px] border border-cyan-500 shadow-[0_0_30px_rgba(0,243,255,0.2)] animate__animated animate__flipInY">
                    <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mb-4">TU PALABRA SECRETA ES</p>
                    <h1 class="text-5xl font-black mb-8 text-white uppercase tracking-wider">${role.word}</h1>
                    <p class="text-slate-500 text-xs mb-8">Memorízala y no se la enseñes a nadie.</p>
                    <button onclick="nextImpostorPlayer()" class="w-full bg-slate-800 border border-slate-600 text-white py-4 rounded-xl font-black text-lg active:scale-95 transition-all">
                        Ocultar y Pasar 🔒
                    </button>
                </div>
            `;
        }

        function nextImpostorPlayer() {
            playSound('click');
            impostorData.currentIndex++;
            renderImpostorPass();
        }

        function renderImpostorPlay() {
            playSound('error');
            const content = document.getElementById('impostor-content');

            // Generar botones de jugadores
            let playersHtml = impostorData.roles.map(r => {
                if (impostorData.eliminated.includes(r.name)) {
                    return `<button disabled class="bg-slate-800/50 text-slate-600 border border-slate-700 py-3 rounded-xl font-bold line-through uppercase">${r.name}</button>`;
                }
                return `<button onclick="processAccusation('${r.name}')" class="bg-slate-800 hover:bg-slate-700 text-white border-2 border-slate-600 hover:border-pink-500 py-3 rounded-xl font-bold transition-all active:scale-95 uppercase">${r.name}</button>`;
            }).join('');

            // Seleccionar a alguien al azar para que rompa el hielo (que no esté eliminado)
            let availableStarters = impostorData.roles.filter(r => !impostorData.eliminated.includes(r.name));
            let starter = availableStarters.length > 0 ? availableStarters[Math.floor(Math.random() * availableStarters.length)].name : "Alguien";

            content.innerHTML = `
                <div class="animate__animated animate__zoomIn">
                    <div class="text-6xl mb-2">🗣️</div>
                    <h1 class="text-3xl font-black mb-2 text-white uppercase">¡A DEBATIR!</h1>
                    <p class="text-cyan-400 font-bold mb-4 uppercase text-sm tracking-widest">INTENTOS RESTANTES: <span class="text-3xl ml-1 text-white">${impostorData.attemptsLeft}</span></p>

                    <div class="bg-pink-500/10 border border-pink-500/30 p-4 rounded-2xl mb-6">
                        <p class="text-pink-400 font-bold uppercase text-xs">Para romper el hielo, empieza preguntando:</p>
                        <p class="text-xl font-black text-white mt-1">${starter}</p>
                    </div>

                    <p class="text-slate-400 text-xs mb-3 uppercase font-bold tracking-widest">Elijan al sospechoso:</p>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        ${playersHtml}
                    </div>
                </div>
            `;
        }

        function processAccusation(accusedName) {
            const content = document.getElementById('impostor-content');

            if (accusedName === impostorData.impostorName) {
                // Ganaron los civiles
                renderImpostorResult(true);
            } else {
                // Equivocación
                playSound('error');
                impostorData.attemptsLeft--;
                impostorData.eliminated.push(accusedName);

                if (impostorData.attemptsLeft > 0) {
                    content.innerHTML = `
                        <div class="glass p-8 rounded-[35px] border border-red-500 shadow-[0_0_30px_rgba(255,0,0,0.2)] animate__animated animate__shakeX">
                            <div class="text-6xl mb-4">❌</div>
                            <h1 class="text-3xl font-black mb-2 text-white uppercase">${accusedName}</h1>
                            <p class="text-red-400 font-bold uppercase tracking-widest text-sm mb-6">NO ES EL IMPOSTOR</p>
                            <p class="text-slate-300 text-sm mb-8">Les quedan <strong class="text-white text-lg">${impostorData.attemptsLeft}</strong> intentos.</p>
                            <button onclick="renderImpostorPlay()" class="w-full bg-slate-800 hover:bg-slate-700 text-white border border-slate-600 py-4 rounded-xl font-black text-lg active:scale-95 transition-all uppercase">
                                Seguir debatiendo 🗣️
                            </button>
                        </div>
                    `;
                } else {
                    // Ganó el impostor
                    renderImpostorResult(false);
                }
            }
        }

        function renderImpostorResult(civiliansWon) {
            playSound(civiliansWon ? 'card' : 'error');
            const content = document.getElementById('impostor-content');

            if (civiliansWon) {
                content.innerHTML = `
                    <div class="glass p-8 rounded-[35px] border-2 border-cyan-500 shadow-[0_0_40px_rgba(0,243,255,0.4)] animate__animated animate__tada">
                        <p class="text-cyan-400 font-bold uppercase tracking-widest text-sm mb-2">¡ATRAPARON AL IMPOSTOR!</p>
                        <h1 class="text-6xl font-black mb-4 text-white uppercase">${impostorData.impostorName}</h1>
                        <p class="text-slate-300 text-sm mb-8">El grupo ha ganado. <strong class="text-pink-500 text-lg uppercase">${impostorData.impostorName}</strong> toma <strong class="text-white text-xl">2 SHOTS</strong>.</p>
                        <button onclick="confirmExit()" class="w-full bg-white text-black py-4 rounded-xl font-black text-lg active:scale-95 transition-all uppercase">
                            Terminar Ronda 🍻
                        </button>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="glass p-8 rounded-[35px] border-2 border-red-500 shadow-[0_0_40px_rgba(255,0,0,0.4)] animate__animated animate__tada">
                        <p class="text-red-400 font-bold uppercase tracking-widest text-sm mb-2">¡EL IMPOSTOR LOS ENGAÑÓ!</p>
                        <h1 class="text-6xl font-black mb-4 text-white uppercase">${impostorData.impostorName}</h1>
                        <p class="text-slate-300 text-sm mb-8">El impostor sobrevive. <strong class="text-red-500 text-lg uppercase">TODOS LOS DEMÁS</strong> toman <strong class="text-white text-xl">1 SHOT</strong>.</p>
                        <button onclick="confirmExit()" class="w-full bg-white text-black py-4 rounded-xl font-black text-lg active:scale-95 transition-all uppercase">
                            Terminar Ronda 🍻
                        </button>
                    </div>
                `;
            }
        }

        // --- SALIDA GLOBAL ---
        function requestExit() { playSound('click'); document.getElementById('exit-modal').classList.remove('hidden'); }
        function closeExitModal() { playSound('click'); document.getElementById('exit-modal').classList.add('hidden'); }
        function confirmExit() {
            playSound('click'); document.getElementById('exit-modal').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('impostor-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            activeRules = [];
        }

        document.getElementById('player-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') addPlayer(); });
    </script>
</body>
</html>
